name: Feature Request
description: 提出一个新功能请求
title: "[Feature] "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## ? 功能请求

        请描述您希望添加的新功能。

  - type: textarea
    id: feature-description
    attributes:
      label: 功能详细描述
      placeholder: 请详细描述您希望添加的功能...
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 解决的问题
      description: 这个功能将解决什么问题？有什么使用场景？
      placeholder: 描述问题和应用场景...

  - type: textarea
    id: solution
    attributes:
      label: 建议的解决方案
      description: 您希望如何实现这个功能？
      placeholder: 描述您的建议方案...

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 您考虑过其他替代方案吗？
      placeholder: 其他替代方案...

  - type: checkboxes
    id: terms
    attributes:
      label:
      options:
        - label: 这是一个新功能请求
          required: true
        - label: 我已搜索过现有Issue，确认没有重复的功能请求
          required: true
