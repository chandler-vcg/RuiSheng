name: Bug Report
description: 报告一个Bug问题
title: "[Bug] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## ? Bug描述

        请简要描述您遇到的Bug。

  - type: textarea
    id: bug-description
    attributes:
      label: Bug详细描述
      placeholder: 请详细描述您遇到的问题...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      placeholder: |
        1. 首先...
        2. 然后...
        3. 接着...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 您期望系统应该如何工作？
      placeholder: 预期...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 系统实际发生了什么？
      placeholder: 实际...
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python版本
      placeholder: 例如: 3.9.0

  - type: input
    id.versions
    attributes:
      label: 其他相关版本 (PyTorch, Node.js等)
      placeholder: 例如: PyTorch 2.0.1, Node.js 18.0.0

  - type: textarea
    id: logs
    attributes:
      label: 错误日志
      description: 如果有错误日志，请粘贴在这里
      placeholder: 粘贴错误日志...

  - type: checkboxes
    id: terms
    attributes:
      label: 
      options:
        - label: 我已确认这是一个Bug，并且不是用户错误操作导致的
          required: true
        - label: 我已搜索过现有Issue，确认没有重复的Bug报告
          required: true
